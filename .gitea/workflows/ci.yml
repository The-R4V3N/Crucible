name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Frontend: type check + tests ───────────────────────────────────────────
  frontend:
    name: Frontend (tsc + vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint src/

      - name: Format check
        run: npx prettier --check src/

      - name: Tests
        run: npm run test

  # ── Rust: clippy + tests ───────────────────────────────────────────────────
  rust:
    name: Rust (clippy + cargo test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Tauri system dependencies on Ubuntu
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config

      # Minimal stubs so tauri::generate_context!() compiles
      - name: Create dist and icon stubs
        run: |
          mkdir -p dist
          echo '<!DOCTYPE html><html><body></body></html>' > dist/index.html
          mkdir -p src-tauri/icons
          # Create a minimal 1x1 PNG if icon.png is missing
          if [ ! -f src-tauri/icons/icon.png ]; then
            python3 -c "
import struct, zlib
def png1x1():
    sig = b'\x89PNG\r\n\x1a\n'
    def chunk(t, d): return struct.pack('>I', len(d)) + t + d + struct.pack('>I', zlib.crc32(t+d)&0xffffffff)
    ihdr = chunk(b'IHDR', struct.pack('>IIBBBBB', 1, 1, 8, 2, 0, 0, 0))
    idat = chunk(b'IDAT', zlib.compress(b'\x00\x00\x00\x00'))
    iend = chunk(b'IEND', b'')
    return sig + ihdr + idat + iend
open('src-tauri/icons/icon.png','wb').write(png1x1())
"
          fi

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Clippy (zero warnings)
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: Tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

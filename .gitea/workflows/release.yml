name: Release

# NOTE: Building the Windows installer (.exe/.msi) requires a Windows runner.
# This workflow is disabled until a Windows act_runner is registered.
# To enable: remove the 'if: false' condition below and register a Windows runner
# with label: windows-latest

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    name: Build Windows installer
    runs-on: ubuntu-latest
    if: false # Remove this line once a Windows runner is available
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build Tauri app
        run: npm run build

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: warp-windows-installer
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

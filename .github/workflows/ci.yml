name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel in-progress runs on the same branch when a new push arrives.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, test, and check
    # Windows-only: portable-pty uses ConPTY which is Windows-native.
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node setup ────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      # ── Frontend checks ───────────────────────────────────────────────────
      - name: Type check (TypeScript)
        run: npm run lint

      - name: Frontend tests (Vitest)
        run: npm run test

      # Build the frontend before Rust checks — tauri::generate_context!() is a
      # proc macro that runs at compile time and panics if ../dist doesn't exist.
      - name: Build frontend (required for tauri::generate_context!)
        run: npm run build:vite

      # ── Rust setup ────────────────────────────────────────────────────────
      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # ── Rust checks ───────────────────────────────────────────────────────
      - name: Clippy (zero warnings)
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

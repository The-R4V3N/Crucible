name: Release

on:
  push:
    # Trigger on version tags: v0.1.0, v1.2.3, etc.
    tags:
      - "v*.*.*"

jobs:
  release:
    name: Build and publish Windows installer
    runs-on: windows-latest
    permissions:
      contents: write # Required to create GitHub Releases and upload assets.

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # ── Node setup ────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      # ── Rust setup ────────────────────────────────────────────────────────
      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # ── Tauri build + GitHub Release ──────────────────────────────────────
      # tauri-action runs `tauri build`, which triggers beforeBuildCommand
      # ("npm run build:vite") automatically via tauri.conf.json.
      # It then creates a GitHub Release and uploads the .exe and .msi installers.
      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "WARP ${{ github.ref_name }}"
          releaseBody: |
            ## What's new
            See [CHANGELOG](https://github.com/The-R4V3N/WARP/commits/master) for details.

            ## Installation
            Download the `.msi` installer (recommended) or the standalone `.exe` below.
          releaseDraft: true
          prerelease: false
